            -DVIX_DB_USE_REDIS=OFF \
            -DCMAKE_INSTALL_PREFIX="${PWD}/.ci-install"

      - name: Build standalone package
        run: |
          cmake --build build-install -j"${BUILD_JOBS}"

      - name: Install standalone package
        run: |
          cmake --install build-install

      - name: Verify installed package files
        run: |
          echo "---- install tree ----"
          find .ci-install -maxdepth 6 -type f | sort || true
          test -f .ci-install/include/vix/middleware/middleware.hpp || (echo "::error::middleware headers not found"; exit 1)

  config-coverage:
    name: Configuration Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout middleware repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y $DEPS
          test -f /usr/include/asio.hpp || (echo "::error::System Asio header not found after install"; exit 1)

      - name: Fetch sibling dependencies
        run: |
          rm -rf ../core ../cache ../utils ../json ../async ../template ../db

          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/core.git ../core
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/cache.git ../cache
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/utils.git ../utils || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/json.git ../json || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" --recurse-submodules https://github.com/vixcpp/async.git ../async || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/template.git ../template || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/db.git ../db || true

          if [ -d ../async ]; then
            git -C ../async submodule update --init --recursive --depth 1 || true
          fi

      - name: Verify required sibling dependencies
        run: |
          test -f ../core/CMakeLists.txt || (echo "::error::../core/CMakeLists.txt is missing"; exit 1)
          test -f ../cache/CMakeLists.txt || (echo "::error::../cache/CMakeLists.txt is missing"; exit 1)

      - name: Export dependency include paths
        run: |
          EXTRA_PATHS="$GITHUB_WORKSPACE/../core/include:$GITHUB_WORKSPACE/../cache/include"
          if [ -d "$GITHUB_WORKSPACE/../utils/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../utils/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../json/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../json/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../async/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../async/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../template/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../template/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../db/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../db/include"
          fi
          echo "CPATH=$EXTRA_PATHS${CPATH:+:$CPATH}" >> "$GITHUB_ENV"
          echo "CPLUS_INCLUDE_PATH=$EXTRA_PATHS${CPLUS_INCLUDE_PATH:+:$CPLUS_INCLUDE_PATH}" >> "$GITHUB_ENV"

      - name: Configure release mode minimal
        run: |
          cmake -G Ninja -S . -B build-release-min \
            -DCMAKE_BUILD_TYPE=Release \
            -DVIX_ENABLE_SANITIZERS=OFF \
            -DVIX_MW_BUILD_TESTS=OFF \
            -DVIX_MW_FETCH_CORE=OFF \
            -DVIX_MW_FETCH_CACHE=OFF \
            -DVIX_MW_FETCH_UTILS=OFF \
            -DVIX_MW_WITH_UTILS=OFF \
            -DVIX_MW_WITH_JSON=OFF \
            -DVIX_DB_USE_MYSQL=OFF \
            -DVIX_DB_USE_SQLITE=OFF \
            -DVIX_DB_USE_POSTGRES=OFF \
            -DVIX_DB_USE_REDIS=OFF

      - name: Build release mode minimal
        run: |
          cmake --build build-release-min -j"${BUILD_JOBS}"

      - name: Configure release mode with utils/json auto
        run: |
          cmake -G Ninja -S . -B build-release-auto \
            -DCMAKE_BUILD_TYPE=Release \
            -DVIX_ENABLE_SANITIZERS=OFF \
            -DVIX_MW_BUILD_TESTS=OFF \
            -DVIX_MW_FETCH_CORE=OFF \
            -DVIX_MW_FETCH_CACHE=OFF \
            -DVIX_MW_FETCH_UTILS=OFF \
            -DVIX_MW_WITH_UTILS=AUTO \
            -DVIX_MW_WITH_JSON=AUTO \
            -DVIX_DB_USE_MYSQL=OFF \
            -DVIX_DB_USE_SQLITE=OFF \
            -DVIX_DB_USE_POSTGRES=OFF \
            -DVIX_DB_USE_REDIS=OFF

      - name: Build release mode with utils/json auto
        run: |
          cmake --build build-release-auto -j"${BUILD_JOBS}"

  summary:
    name: Middleware Strict CI Summary
    needs:
      [
        build-test-sanitized,
        runtime-smoke,
        static-analysis,
        valgrind,
        standalone-package-check,
        config-coverage,
      ]
    runs-on: ubuntu-latest

    steps:
      - name: Print summary
        run: |
          echo "Middleware strict CI completed."
          echo "This workflow validates:"
          echo "- sanitized builds"
          echo "- unit tests"
          echo "- runtime smoke checks"
          echo "- static analysis"
          echo "- valgrind"
          echo "- standalone package export"
          echo "- minimal mode"
          echo "- utils/json AUTO mode"
