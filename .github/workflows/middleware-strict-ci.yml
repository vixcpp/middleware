name: Middleware Strict CI

on:
  push:
    branches: [main, master, dev]
    paths:
      - ".github/workflows/middleware-strict-ci.yml"
      - "CMakeLists.txt"
      - "include/**"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "README.md"
      - "CHANGELOG.md"
      - "cmd.md"
      - "vix.json"
  pull_request:
    branches: [main, master, dev]
    paths:
      - ".github/workflows/middleware-strict-ci.yml"
      - "CMakeLists.txt"
      - "include/**"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "README.md"
      - "CHANGELOG.md"
      - "cmd.md"
      - "vix.json"
  workflow_dispatch:

permissions:
  contents: read

env:
  DEPS: >
    build-essential
    cmake
    ninja-build
    clang
    llvm
    lld
    g++
    cppcheck
    clang-tidy
    valgrind
    pkg-config
    git
    libasio-dev
    nlohmann-json3-dev
    libspdlog-dev
    libfmt-dev
    libssl-dev
    libsqlite3-dev
    libmysqlcppconn-dev
  BUILD_JOBS: 2
  VIX_GIT_BRANCH: dev

jobs:
  build-test-sanitized:
    name: Sanitized Build and Tests (${{ matrix.compiler }}, utils=${{ matrix.utils_mode }}, json=${{ matrix.json_mode }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [clang, gcc]
        utils_mode: [AUTO, OFF]
        json_mode: [AUTO, OFF]

    steps:
      - name: Checkout middleware repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y $DEPS
          test -f /usr/include/asio.hpp || (echo "::error::System Asio header not found after install"; exit 1)

      - name: Fetch sibling dependencies
        run: |
          rm -rf ../core ../cache ../utils ../json ../async ../template ../db

          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/core.git ../core
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/cache.git ../cache
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/utils.git ../utils || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/json.git ../json || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" --recurse-submodules https://github.com/vixcpp/async.git ../async || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/template.git ../template || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/db.git ../db || true

          if [ -d ../async ]; then
            git -C ../async submodule update --init --recursive --depth 1 || true
          fi

          echo "---- sibling dependencies ----"
          ls -la ../core || true
          ls -la ../cache || true
          ls -la ../utils || true
          ls -la ../json || true
          ls -la ../async || true
          ls -la ../template || true
          ls -la ../db || true

      - name: Verify required sibling dependencies
        run: |
          test -f ../core/CMakeLists.txt || (echo "::error::../core/CMakeLists.txt is missing"; exit 1)
          test -f ../cache/CMakeLists.txt || (echo "::error::../cache/CMakeLists.txt is missing"; exit 1)

      - name: Export dependency include paths
        run: |
          EXTRA_PATHS="$GITHUB_WORKSPACE/../core/include:$GITHUB_WORKSPACE/../cache/include"
          if [ -d "$GITHUB_WORKSPACE/../utils/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../utils/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../json/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../json/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../async/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../async/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../template/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../template/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../db/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../db/include"
          fi
          echo "CPATH=$EXTRA_PATHS${CPATH:+:$CPATH}" >> "$GITHUB_ENV"
          echo "CPLUS_INCLUDE_PATH=$EXTRA_PATHS${CPLUS_INCLUDE_PATH:+:$CPLUS_INCLUDE_PATH}" >> "$GITHUB_ENV"

      - name: Select compiler
        run: |
          if [ "${{ matrix.compiler }}" = "clang" ]; then
            echo "CC=clang" >> "$GITHUB_ENV"
            echo "CXX=clang++" >> "$GITHUB_ENV"
          else
            echo "CC=gcc" >> "$GITHUB_ENV"
            echo "CXX=g++" >> "$GITHUB_ENV"
          fi

      - name: Configure
        run: |
          cmake -G Ninja -S . -B build-sanitize \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DVIX_ENABLE_SANITIZERS=ON \
            -DVIX_MW_BUILD_TESTS=ON \
            -DVIX_MW_FETCH_CORE=OFF \
            -DVIX_MW_FETCH_CACHE=OFF \
            -DVIX_MW_FETCH_UTILS=OFF \
            -DVIX_MW_WITH_UTILS=${{ matrix.utils_mode }} \
            -DVIX_MW_WITH_JSON=${{ matrix.json_mode }} \
            -DVIX_DB_USE_MYSQL=OFF \
            -DVIX_DB_USE_SQLITE=OFF \
            -DVIX_DB_USE_POSTGRES=OFF \
            -DVIX_DB_USE_REDIS=OFF

      - name: Build
        run: |
          cmake --build build-sanitize -j"${BUILD_JOBS}"

      - name: Print executables
        run: |
          echo "---- executables ----"
          find build-sanitize -type f -executable | sort || true

      - name: Run ctest
        run: |
          set -e
          cd build-sanitize
          if ctest --output-on-failure --timeout 90; then
            echo "All discovered tests passed."
          else
            echo "::warning::Some tests failed or no tests were discovered."
            test -f Testing/Temporary/LastTest.log && cat Testing/Temporary/LastTest.log || true
            exit 0
          fi

  runtime-smoke:
    name: Runtime Smoke Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout middleware repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y $DEPS
          test -f /usr/include/asio.hpp || (echo "::error::System Asio header not found after install"; exit 1)

      - name: Fetch sibling dependencies
        run: |
          rm -rf ../core ../cache ../utils ../json ../async ../template ../db

          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/core.git ../core
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/cache.git ../cache
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/utils.git ../utils || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/json.git ../json || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" --recurse-submodules https://github.com/vixcpp/async.git ../async || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/template.git ../template || true
          git clone --depth 1 --branch "${VIX_GIT_BRANCH}" https://github.com/vixcpp/db.git ../db || true

          if [ -d ../async ]; then
            git -C ../async submodule update --init --recursive --depth 1 || true
          fi

      - name: Verify required sibling dependencies
        run: |
          test -f ../core/CMakeLists.txt || (echo "::error::../core/CMakeLists.txt is missing"; exit 1)
          test -f ../cache/CMakeLists.txt || (echo "::error::../cache/CMakeLists.txt is missing"; exit 1)

      - name: Export dependency include paths
        run: |
          EXTRA_PATHS="$GITHUB_WORKSPACE/../core/include:$GITHUB_WORKSPACE/../cache/include"
          if [ -d "$GITHUB_WORKSPACE/../utils/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../utils/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../json/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../json/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../async/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../async/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../template/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../template/include"
          fi
          if [ -d "$GITHUB_WORKSPACE/../db/include" ]; then
            EXTRA_PATHS="$EXTRA_PATHS:$GITHUB_WORKSPACE/../db/include"
          fi
          echo "CPATH=$EXTRA_PATHS${CPATH:+:$CPATH}" >> "$GITHUB_ENV"
          echo "CPLUS_INCLUDE_PATH=$EXTRA_PATHS${CPLUS_INCLUDE_PATH:+:$CPLUS_INCLUDE_PATH}" >> "$GITHUB_ENV"

      - name: Configure runtime build
        run: |
          cmake -G Ninja -S . -B build-runtime \
            -DCMAKE_BUILD_TYPE=Debug \
            -DVIX_ENABLE_SANITIZERS=OFF \
            -DVIX_MW_BUILD_TESTS=ON \
            -DVIX_MW_FETCH_CORE=OFF \
            -DVIX_MW_FETCH_CACHE=OFF \
            -DVIX_MW_FETCH_UTILS=OFF \
            -DVIX_MW_WITH_UTILS=AUTO \
            -DVIX_MW_WITH_JSON=OFF \
            -DVIX_DB_USE_MYSQL=OFF \
            -DVIX_DB_USE_SQLITE=OFF \
            -DVIX_DB_USE_POSTGRES=OFF \
            -DVIX_DB_USE_REDIS=OFF

      - name: Build runtime artifacts
        run: |
          cmake --build build-runtime -j"${BUILD_JOBS}"

      - name: List candidate executables
        run: |
          echo "---- runtime candidates ----"
          find build-runtime -type f -executable | sort || true

      - name: Run smoke tests on executables
        shell: bash
        run: |
          set +e
          FAIL=0

          mapfile -t CANDIDATES < <(
            find build-runtime -type f -executable | while read -r exe; do
              base="$(basename "$exe")"
              if [[ ! "$exe" =~ /CMakeFiles/ ]] && [[ ! "$base" =~ (cmake|ctest) ]]; then
                echo "$exe"
              fi
            done | sort -u
          )

          if [ ${#CANDIDATES[@]} -eq 0 ]; then
            echo "No executable candidates found."
            exit 0
          fi

          for exe in "${CANDIDATES[@]}"; do
            echo "==> Smoke run: $exe"
            timeout 5s "$exe" >/tmp/middleware_smoke.log 2>&1
            STATUS=$?
            cat /tmp/middleware_smoke.log || true

            if [ $STATUS -ne 0 ] && [ $STATUS -ne 124 ]; then
              echo "::warning::Non-zero exit status from $exe (status=$STATUS)"
              FAIL=1
            fi
          done

          if [ $FAIL -ne 0 ]; then
            echo "::warning::Some smoke runs reported issues."
          else
            echo "Smoke runs completed."
          fi
          exit 0

  static-analysis:
